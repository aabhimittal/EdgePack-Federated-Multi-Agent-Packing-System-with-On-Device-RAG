name: CI
on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - name: quantization workflow dry-run
        run: python scripts/quantize_model.py --model mistralai/Mistral-7B-Instruct-v0.3 --ram-limit 6 --coreml --out /tmp/q --registry /tmp/reg
